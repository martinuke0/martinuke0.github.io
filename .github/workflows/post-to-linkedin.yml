name: Post to LinkedIn (Queue Processor)

on:
  push:
    branches: [main]          # runs on every push — reliable fallback for cron gaps
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes
  workflow_dispatch: {}       # manual trigger for testing

permissions:
  contents: write

jobs:
  process-queue:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Process LinkedIn queue
        id: process
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
        run: |
          python scripts/process_linkedin_queue.py
          echo "queue_changed=$(git diff --quiet data/social_queue.json && echo false || echo true)" >> "$GITHUB_OUTPUT"

      - name: Commit and push updated queue
        if: steps.process.outputs.queue_changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/social_queue.json
          git commit -m "chore: mark LinkedIn post(s) as posted"
          git push

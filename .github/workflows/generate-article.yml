name: Generate Article

on:
  workflow_dispatch:
    inputs:
      topic:
        description: "Article topic / prompt"
        required: true
        type: string
      delay_minutes:
        description: "Delay before generation starts (minutes)"
        required: false
        default: "0"
        type: string

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Delay if requested
        if: ${{ inputs.delay_minutes != '0' && inputs.delay_minutes != '' }}
        run: sleep $(( ${{ inputs.delay_minutes }} * 60 ))

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          submodules: recursive
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Generate article
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL || 'anthropic/claude-sonnet-4-5' }}
        run: python scripts/generate_article.py --topic "${{ inputs.topic }}"

      - name: Queue LinkedIn post
        run: python scripts/queue_linkedin_post.py

      - name: Commit and push article + queue
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/posts/ data/social_queue.json
          git commit -m "Auto-publish: ${{ inputs.topic }}"
          git push

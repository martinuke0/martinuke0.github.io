name: Process Article Queue

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  actions: write

jobs:
  process-queue:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Process queue
        id: queue
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          python3 - <<'EOF'
          import json, os, subprocess
          from datetime import datetime, timezone
          from pathlib import Path

          queue_file = Path("data/article_queue.json")
          queue = json.loads(queue_file.read_text())
          now = datetime.now(timezone.utc)
          triggered = []

          for entry in queue:
              if entry.get("status") != "pending":
                  continue
              publish_after = datetime.fromisoformat(
                  entry["publish_after"].replace("Z", "+00:00")
              )
              if publish_after <= now:
                  topic = entry["topic"]
                  print(f"Triggering article generation for: {topic}")
                  subprocess.run(
                      [
                          "gh", "workflow", "run", "generate-article.yml",
                          "-f", f"topic={topic}",
                      ],
                      check=True,
                  )
                  entry["status"] = "processing"
                  triggered.append(topic)

          queue_file.write_text(json.dumps(queue, indent=2) + "\n")

          if triggered:
              print(f"Triggered {len(triggered)} article(s): {triggered}")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write(f"triggered={len(triggered)}\n")
          else:
              print("No pending articles due yet.")
          EOF

      - name: Commit queue updates
        if: steps.queue.outputs.triggered != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/article_queue.json
          git commit -m "Queue: mark triggered articles as processing"
          git push
